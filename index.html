<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charger Downtime Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
      --text: #1a1a18; --text2: #6b6b63; --text3: #9e9e94;
      --blue: #1a6ef5; --blue-light: #e8f0fe; --blue-dark: #0d47b5;
      --amber: #d4820a; --amber-light: #fef3d7;
      --green: #1f7a3e; --green-light: #e6f5ec;
      --teal: #0f7a7a; --teal-light: #e0f5f5;
      --purple: #6c3fc4; --purple-light: #f0ebfd;
      --red: #c0392b; --red-light: #fde8e6;
      --gray: #5f5e5a; --gray-light: #f1efe8;
      --radius: 10px; --radius-lg: 14px;
      --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.08);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand svg { width: 28px; height: 28px; }
    .header-brand span { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
    .last-updated { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
    .main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

    .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow); }
    .config-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .config-row label { font-size: 13px; font-weight: 500; color: var(--text2); min-width: 130px; }
    .config-row input[type=text] { flex: 1; min-width: 220px; font-size: 13px; font-family: 'DM Mono', monospace; padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.15s; }
    .config-row input[type=text]:focus { border-color: var(--blue); background: var(--surface); }

    .filter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; box-shadow: var(--shadow); }
    .filter-bar input[type=date] { font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 7px 10px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; box-shadow: var(--shadow); }
    .metric-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; }
    .metric-val { font-size: 28px; font-weight: 600; color: var(--text); letter-spacing: -1px; }

    .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: var(--radius); padding: 4px; margin-bottom: 1.5rem; width: fit-content; }
    .tab { font-size: 13px; font-weight: 500; padding: 7px 18px; border-radius: 8px; border: none; background: none; cursor: pointer; color: var(--text2); }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

    .btn { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border2); cursor: pointer; background: var(--surface); }
    .btn-primary { background: var(--blue); color: #fff; }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; box-shadow: var(--shadow); }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; margin-bottom: 10px; }

    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { font-size: 12px; width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; height: 20px; background: var(--surface2); border-radius: 5px; }
    .bar-fill { height: 100%; border-radius: 5px; background: var(--blue); }
    .bar-num { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; min-width: 60px; text-align: right; }

    .hidden { display: none; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning svg { animation: spin 0.7s linear infinite; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="#1a6ef5"/><path d="M8 20 L14 8 L20 20" stroke="white" stroke-width="2" fill="none"/><path d="M10 16 L18 16" stroke="white" stroke-width="2"/></svg>
    <span>Charger Downtime Dashboard</span>
  </div>
  <span class="last-updated" id="lastUpdated">Not loaded yet</span>
</header>

<main class="main">
  <div class="config-card">
    <div class="config-row">
      <label>📊 Sheet CSV URL</label>
      <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv" />
    </div>
    <div class="config-row">
      <label>🔁 Proxy URL</label>
      <input type="text" id="proxyUrl" placeholder="https://YOUR-WORKER.workers.dev" />
    </div>
    <div class="config-row">
      <button class="btn btn-primary" id="refreshBtn" onclick="loadData()">Refresh Data</button>
      <div id="statusPill" class="status-pill"><span id="statusText">Awaiting URL</span></div>
    </div>
  </div>

  <div class="filter-bar">
    <label>📅 Date range</label>
    <input type="date" id="dateFrom" onchange="applyFilter()" />
    <span>→</span>
    <input type="date" id="dateTo" onchange="applyFilter()" />
    <span id="filterCount"></span>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Total Events</div><div class="metric-val" id="mTotal">—</div></div>
    <div class="metric"><div class="metric-label">Unique Chargers</div><div class="metric-val" id="mChargers">—</div></div>
    <div class="metric"><div class="metric-label">Total Downtime</div><div class="metric-val" id="mHours">—</div><div style="font-size:12px">hours</div></div>
    <div class="metric"><div class="metric-label">Worst Charger</div><div class="metric-val" id="mWorst" style="font-size:16px">—</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">Overview</button>
    <button class="tab" onclick="switchTab('city')">By City</button>
  </div>

  <div class="tab-panel active" id="tab-overview">
    <div class="card">
      <div class="section-title">Total Downtime by City (Hrs)</div>
      <div id="cityChart"></div>
    </div>
  </div>
  
  <div class="tab-panel" id="tab-city" id="cityBreakdown"></div>
</main>

<script>
let allRows = [];
let filteredRows = [];

function parseCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
  
  const iCharger = headers.findIndex(h => h.includes('charger id'));
  const iHours = headers.findIndex(h => h.includes('power down time') || h.includes('hours'));
  const iCity = headers.findIndex(h => h.includes('city'));
  const iStart = headers.findIndex(h => h.includes('downtime'));

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (!cols[iCharger]) continue;

    // FIX: Strip symbols and force into a Number
    const rawHrs = (cols[iHours] || '0').replace(/[^0-9.]/g, '');
    
    rows.push({
      charger: cols[iCharger].replace(/"/g,'').trim(),
      hours: Number(rawHrs) || 0,
      city: (cols[iCity] || 'Unknown').replace(/"/g,'').trim(),
      date: new Date(cols[iStart])
    });
  }
  return rows;
}

function splitCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQ = !inQ; continue; }
    if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += line[i];
  }
  result.push(cur);
  return result;
}

async function loadData() {
  const sUrl = document.getElementById('sheetUrl').value;
  const pUrl = document.getElementById('proxyUrl').value.replace(/\/$/, '');
  const btn = document.getElementById('refreshBtn');

  btn.classList.add('spinning');
  try {
    const res = await fetch(`${pUrl}?url=${encodeURIComponent(sUrl)}`);
    const text = await res.text();
    allRows = parseCSV(text);
    filteredRows = [...allRows];
    renderAll();
    document.getElementById('statusText').textContent = "Loaded " + allRows.length + " rows";
  } catch (e) {
    alert("Error loading: " + e.message);
  }
  btn.classList.remove('spinning');
}

function renderAll() {
  // Metric Calculation Fix
  const total = filteredRows.length;
  const chars = new Set(filteredRows.map(r => r.charger)).size;
  
  // FIX: Use Number addition in reduce
  const hrs = filteredRows.reduce((sum, r) => {   return sum + Number(r.hours || 0); }, 0);
  
  const byC = {};
  filteredRows.forEach(r => { byC[r.charger] = (byC[r.charger] || 0) + r.hours; });
  const worst = Object.entries(byC).sort((a,b) => b[1]-a[1])[0];

  document.getElementById('mTotal').textContent = total;
  document.getElementById('mChargers').textContent = chars;
  document.getElementById('mHours').textContent = hrs.toLocaleString(undefined, {maximumFractionDigits:1});
  document.getElementById('mWorst').textContent = worst ? worst[0] : '—';

  renderCharts();
}

function renderCharts() {
  const cityData = {};
  filteredRows.forEach(r => { cityData[r.city] = (cityData[r.city] || 0) + r.hours; });
  
  const sorted = Object.entries(cityData).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  const html = sorted.map(([name, val]) => `
    <div class="bar-row">
      <div class="bar-label">${name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(val/max)*100}%"></div></div>
      <div class="bar-num">${val.toFixed(1)} hrs</div>
    </div>
  `).join('');
  
  document.getElementById('cityChart').innerHTML = html;
}

function applyFilter() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if(!from && !to) { filteredRows = [...allRows]; }
  else {
    const dFrom = from ? new Date(from) : new Date(0);
    const dTo = to ? new Date(to) : new Date();
    filteredRows = allRows.filter(r => r.date >= dFrom && r.date <= dTo);
  }
  renderAll();
}

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
